# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
#
# CodeRabbit configuration for Cloudy.
#
# Cloudy is NOT an app — it is a published Kotlin Multiplatform Compose library that renders
# blur and "liquid glass" effects across Android, iOS, macOS, JVM Desktop, and WASM:
#   - cloudy/commonMain : public API surface (expect declarations) in strict explicit-API mode
#   - cloudy/skikoMain  : single Skia actual shared by jvm + ios + macos + wasmJs
#   - cloudy/androidMain : Android actual — RenderEffect (API 31+) / AGSL RuntimeShader (33+)
#                          with a native C++ RenderScript-Toolkit CPU fallback for minSdk 23–30
#   - cloudy/src/main/cpp : vendored/adapted AOSP RenderScript Toolkit (C++/NEON) used by the fallback
#   - app, docs          : sample Compose app and a Kotlin/Wasm documentation site (gh-pages)
#   - benchmark          : Macrobenchmark / baseline-profile module
#
# Review priorities follow from that: cross-platform expect/actual parity, published-API binary
# compatibility (apiCheck/.api dumps), API-level gating on Android, AGSL↔SKSL shader parity, and
# native memory/JNI safety matter far more than style — formatting is fully owned by Spotless in CI.

language: "en-US"
early_access: false

tone_instructions: >-
  Review as a senior Kotlin Multiplatform + Jetpack Compose + Android-graphics engineer.
  Prioritize correctness, expect/actual parity across platforms, published-API backward
  compatibility, Android API-level gating, shader (AGSL/SKSL) parity, and native (C++/JNI)
  memory safety. Never comment on formatting or import ordering — Spotless owns it. Be
  direct; skip praise.

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    ignore_usernames:
      - "renovate[bot]"
      - "dependabot[bot]"

  # ── What NOT to review ─────────────────────────────────────────────────────
  # Everything below is machine-generated, binary, vendored, or a baseline that must be
  # regenerated by a Gradle task instead of being hand-edited — review comments here are noise.
  path_filters:
    # Binary-compatibility-validator dumps, regenerated via `./gradlew apiDump` and enforced by
    # `apiCheck` in CI. The Kotlin SOURCES that produce them ARE reviewed; only the dumps aren't.
    - "!cloudy/api/**/*.api"
    # Kotlin/JS + Kotlin/Wasm package-manager lockfiles.
    - "!kotlin-js-store/**"
    # Native build scratch output and Gradle/build outputs.
    - "!**/.cxx/**"
    - "!**/build/**"
    - "!**/.gradle/**"
    # Hand-vendored AOSP NEON assembly kernels (Blur_neon.S / Blur_advsimd.S) — reviewing these
    # byte-for-byte is noise; the C++ that drives them IS reviewed.
    - "!cloudy/src/main/cpp/**/*.S"
    # Images / GIFs / marketing + preview assets.
    - "!**/*.png"
    - "!**/*.gif"
    - "!**/*.svg"
    - "!**/*.webp"
    - "!art/**"
    - "!preview/**"
    - "!screenshots/**"
    - "!composeResources/**"
    # Xcode host-project metadata (generated; not the library).
    - "!**/*.pbxproj"
    - "!**/*.xcworkspace/**"
    - "!**/*.xcassets/**"
    # Gradle wrapper binaries/scripts.
    - "!gradle/wrapper/**"
    - "!gradlew"
    - "!gradlew.bat"
    # Spotless license-header templates (boilerplate by definition).
    - "!spotless/**"
    # IDE metadata and GitHub boilerplate.
    - "!.idea/**"
    - "!**/*.iml"
    - "!.github/ISSUE_TEMPLATE/**"
    - "!.github/FUNDING.yml"
    - "!.github/pull_request_template.md"
    - "!LICENSE"

  # ── Per-area review checklists ─────────────────────────────────────────────
  path_instructions:
    # ===== Public API surface (commonMain) =====
    - path: "cloudy/src/commonMain/**"
      instructions: >-
        This is the published library's public API surface, compiled with
        `-Xexplicit-api=strict`. Check:
        (1) BINARY/SOURCE COMPAT — public API changes must be additive (new overloads or
        defaulted parameters; keep legacy entry points delegating). Any change to a public
        signature requires regenerated `cloudy/api/**/*.api` dumps (`./gradlew apiDump`) in
        the SAME PR, or `apiCheck` will fail CI. Removing/renaming public symbols or reordering
        parameters is a breaking change — flag it.
        (2) EXPECT/ACTUAL SYMMETRY — every `expect` here (Modifier.cloudy, PlatformBitmap,
        LiquidGlass, CloudyBackground, etc.) must have matching `actual`s in BOTH androidMain
        AND skikoMain. A change to an expect signature that updates only one side is a compile
        break; flag asymmetry, including divergent KDoc/defaults.
        (3) EXPLICIT API — strict mode requires explicit `public`/`internal` visibility and a
        return type on every API declaration; new public API needs KDoc.
        (4) COMPOSE STABILITY — @Immutable/@Stable on public types (e.g. PlatformBitmap,
        CloudyState) must be truthful: annotating a type whose public state can change is a
        recomposition-correctness bug for consumers. Modifier factory params should be stable.
        (5) STATE CONTRACT — CloudyState is a sealed hierarchy consumed by user `onStateChanged`
        callbacks (Nothing / Loading / Success.Applied / Success.Captured / Error). Changing the
        hierarchy, or the Applied-vs-Captured semantics (Applied = GPU, no bitmap; Captured =
        CPU, bitmap present), is a breaking behavioral change — call it out.
        (6) License header — new files need the Apache-2.0 header with author "skydoves
        (Jaewoong Eum)" (Spotless enforces; just confirm it's present on new files).

    # ===== Android actual: GPU RenderEffect + native CPU fallback =====
    - path: "cloudy/src/androidMain/**"
      instructions: >-
        Android `actual` implementations. minSdk is 23, compileSdk 36. The blur strategy is
        chosen by API level: RenderEffect (API 31+), AGSL RuntimeShader for liquid glass
        (API 33+), and a native C++ RenderScript-Toolkit CPU path for API 23–30. Check:
        (1) API-LEVEL GATING — any RenderEffect / RuntimeShader / RenderNode / hardware-bitmap
        use must be guarded (Build.VERSION.SDK_INT or @RequiresApi) and have a working fallback
        down to minSdk 23. An ungated 31+/33+ API is a crash on older devices — flag as critical.
        (2) STRATEGY SELECTION — CloudyBlurStrategy / CloudyLegacyBlurStrategy /
        CloudyRenderEffectStrategy selection must map to the correct API range; verify the
        boundary conditions (exactly 31, exactly 33) rather than off-by-one ranges.
        (3) BITMAP LIFECYCLE — captured bitmaps must use ARGB_8888, avoid leaking large
        Bitmaps/RenderNodes, respect PlatformBitmap.isRecyclable, and not recycle a bitmap still
        handed to a callback. Heavy work belongs off the composition thread (coroutines).
        (4) NATIVE BRIDGE — calls into RenderScriptToolkit (JNI) must validate inputs and must
        DEGRADE (return un-blurred / emit CloudyState.Error) rather than crash the host app when
        the native lib is unavailable or throws.
        (5) PARITY — when changing blur/glass behavior, confirm the skikoMain actual stays
        behaviorally consistent (same radius→sigma mapping, same default parameters).

    # ===== Skia actual: shared by jvm + ios + macos + wasmJs =====
    - path: "cloudy/src/skikoMain/**"
      instructions: >-
        Single Skia-based `actual` shared by the JVM Desktop, iOS, macOS, and WASM targets via
        the `skikoMain` intermediate source set. Check:
        (1) BLAST RADIUS — a change here affects FOUR platforms at once; reason about iOS (Metal),
        Desktop (JVM), macOS, and wasmJs together, not just the one you tested. Flag anything that
        assumes a single platform's behavior.
        (2) SKIA APIs — blur via Skia ImageFilter/RenderEffect and liquid glass via
        RuntimeShaderBuilder(SKSL) must use uniform names that exactly match
        LiquidGlassShaderSource.SKSL; a renamed/omitted uniform fails at runtime, not compile time.
        (3) BEHAVIORAL PARITY with androidMain — radius→sigma conversion, clamping, and default
        parameter values must match the Android path so output is consistent cross-platform.
        (4) wasmJs has NO unit tests (Kotest doesn't support wasmJs yet); be extra careful with
        wasm-affecting changes since CI won't catch regressions there.

    # ===== Liquid Glass shaders: AGSL ↔ SKSL parity =====
    - path: "cloudy/src/commonMain/kotlin/com/skydoves/cloudy/LiquidGlassShaderSource.kt"
      instructions: >-
        This file holds TWO shader sources for the same effect: AGSL (Android RuntimeShader,
        API 33+) and SKSL (Skia platforms). They MUST stay in parity. Check that any edit to one
        variant is mirrored in the other: identical uniform names, declaration order, default
        constants, and equivalent math/SDF logic. Also verify the uniform set still matches the
        Kotlin binding code in both androidMain and skikoMain LiquidGlass implementations — a
        uniform added here but not bound (or named differently) is a runtime shader failure.
        Flag one-sided edits and uniform-name drift as breaking.

    # ===== Native C++ (RenderScript Toolkit) =====
    - path: "cloudy/src/main/cpp/**"
      instructions: >-
        Vendored/adapted AOSP RenderScript Toolkit (C++), the CPU blur fallback for Android
        23–30, called over JNI. Do NOT nitpick AOSP code style. DO check:
        (1) MEMORY SAFETY — bounds and integer-overflow on width*height*bytesPerPixel,
        no out-of-bounds reads/writes in the blur kernels, correct stride handling.
        (2) JNI — AndroidBitmap_lockPixels/unlockPixels must be paired on every return path,
        local references released, exceptions checked; never let a native crash escape into the
        host app.
        (3) THREAD POOL — TaskProcessor worker state must stay thread-safe; the toolkit promises
        sequential, thread-safe public calls.
        (4) ABI / PAGE SIZE — the build enables 16 KB page support
        (ANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES) and c++17; flag changes that would break 16 KB
        alignment or drop an ABI. CMakeLists source lists must match files actually present.

    # ===== Tests =====
    - path: "cloudy/src/{commonTest,androidUnitTest,iosTest,desktopTest}/**"
      instructions: >-
        commonTest/iosTest use Kotest; androidUnitTest uses JUnit4 + Robolectric + Mockito;
        desktopTest runs on JUnit5 (useJUnitPlatform). wasmJs has no test task. Tests must be
        deterministic and must NOT depend on a real GPU/RenderEffect or a physical device —
        blur output assertions should target the CPU/fallback path or pure logic (state machine,
        parameter validation, sigma mapping). New public behavior or a fixed bug should come with
        a test. Flag tests that would be flaky under Robolectric's software rendering.

    # ===== Sample app =====
    - path: "app/**"
      instructions: >-
        Sample/integration Compose Multiplatform app — not a production codebase. Screens here
        INTENTIONALLY demonstrate blur and liquid-glass effects (sliders, progressive blur,
        radius galleries); do not suggest "removing" or "optimizing away" demo usages. Focus on
        whether the sample still exercises the public library API end-to-end on each platform and
        on build-script / expect-actual correctness across its own source sets.

    # ===== Documentation site (Kotlin/Wasm) =====
    - path: "docs/**"
      instructions: >-
        A Compose-for-Web (Kotlin/Wasm) documentation site deployed to gh-pages — sample, not
        production. Verify that API code snippets shown to users (Modifier.cloudy, liquidGlass,
        progressive blur, CloudyState handling) match the CURRENT public API signatures and the
        platform-support table reflects real platform behavior. Do not nitpick UI/prose styling.

    # ===== Benchmark =====
    - path: "benchmark/**"
      instructions: >-
        Macrobenchmark / baseline-profile module. Review for benchmark validity (correct
        CompilationMode, no measurement inside warmup, stable scenarios) rather than feature
        logic; it does not ship in the published artifact.

    # ===== Build logic & versions =====
    - path: "**/*.gradle.kts"
      instructions: >-
        Check that dependencies/plugins go through gradle/libs.versions.toml (no hardcoded
        versions or credentials), KMP target/source-set wiring stays consistent (the
        applyDefaultHierarchyTemplate skiko group spans jvm+ios+macos+wasmJs), and that
        publishing/signing config in the cloudy module keeps coordinates/version derived from
        gradle.properties. Flag anything that would break configuration on a target a contributor
        can't build locally (e.g. iOS arch gated by `activeArch`).

    - path: "gradle/libs.versions.toml"
      instructions: >-
        Version pins here are load-bearing for a published KMP + Compose library. The Compose
        Compiler is tied to the Kotlin version, and Compose Multiplatform ↔ androidx Compose ↔
        AGP must stay mutually compatible. A Kotlin / Compose / AGP bump implies a cross-platform
        compile review (android + skiko + ios + wasm) and usually a library version bump; flag
        one-sided bumps. Renovate intentionally PINS Kotlin/KSP/Compose-Compiler and Spotless
        (see renovate.json) — a manual bump to those is deliberate and worth extra scrutiny.

    - path: "buildSrc/**"
      instructions: >-
        Shared build conventions (Configuration: minSdk/compileSdk/artifact coordinates;
        ActiveArch: which iOS arch is built locally vs. CI). Changes fan out to every module —
        check for configuration-time side effects and that minSdk/compileSdk changes are
        intentional (minSdk gates the native-fallback support window).

    # ===== CI =====
    - path: ".github/workflows/**"
      instructions: >-
        CI invariants: `spotlessCheck` owns formatting, `apiCheck` enforces binary compatibility
        against committed .api dumps, and the build job compiles all targets. The docs workflow
        publishes the Kotlin/Wasm site to gh-pages on changes under docs/** or cloudy/**. Flag
        GitHub Action version downgrades, any step that could leak signing secrets / OSSRH
        credentials into logs, and removal of the spotless or apiCheck gates.

    # ===== Top-level docs =====
    - path: "README.md"
      instructions: >-
        User-facing README. Verify code snippets compile against the CURRENT public API
        (Modifier.cloudy parameters, liquid-glass API, CloudyState branches), the platform
        support matrix matches actual behavior (GPU vs CPU fallback, API-level notes), and the
        version badge/coordinates stay consistent with the published artifact. Do not nitpick
        prose style.

  # ── Static analysis tools ──────────────────────────────────────────────────
  tools:
    # Style/formatting is owned by Spotless in CI; this project has no detekt/markdownlint
    # config, so keep them off to avoid duplicate noise.
    detekt:
      enabled: false
    markdownlint:
      enabled: false
    # Secrets must never land in a public, published-to-Maven-Central repo.
    gitleaks:
      enabled: true
    # Workflow + YAML files are part of the release path; lint them.
    actionlint:
      enabled: true
    yamllint:
      enabled: true

chat:
  auto_reply: true
