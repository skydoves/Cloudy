# Screenshot diff comment (PRIVILEGED half of the two-workflow split).
#
# Adapted from takahirom/roborazzi-compare-on-github-comment-sample (CompareScreenshotComment.yml).
# Runs via `workflow_run` AFTER "Screenshot Tests" completes, so it executes in the BASE-REPO
# context with a write token even when the triggering run came from a fork PR. This is what makes
# the gallery comment work on fork PRs (l2hyunwoo -> skydoves); a comment step inside the
# pull_request job would silently fail (read-only token, no secrets).
#
# Mechanism (GitHub cannot inline arbitrary CI files in a comment): the *_compare.png images are
# committed to an orphan branch `companion_<head-branch>` and the comment links to their raw blob
# URLs (.../blob/<branch>/<file>?raw=true) so they render inline. No S3/GCS bucket required.
#
# NOTE: workflow_run only fires for workflow files that exist on the repository's DEFAULT branch.
# Until this file is merged to skydoves:main it will not trigger -- expected, not a bug.

name: Screenshot diff comment

on:
  workflow_run:
    # MUST match the `name:` of the compare workflow exactly, or this never triggers.
    workflows: [ "Screenshot Tests" ]
    types: [ completed ]

permissions: {}

jobs:
  comment:
    name: Post screenshot diff comment
    # Only react to pull_request-triggered runs (not pushes to main).
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read           # download artifacts from the triggering run
      contents: write         # push diff images to the companion_* orphan branch
      pull-requests: write    # create / update the PR comment
    steps:
      # --- Resolve the PR number from the artifact the compare job uploaded ---
      - name: Download PR number artifact
        uses: actions/download-artifact@v4
        with:
          name: pr
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - id: pr
        name: Read PR number
        shell: bash
        # NR is written by OUR compare workflow from github.event.number (an integer), so its
        # content is trusted-origin, not fork-controlled. Guard with a regex anyway (cheap) so a
        # non-integer can never flow into downstream ${{ steps.pr.outputs.number }} uses.
        run: |
          number="$(cat NR)"
          [[ "$number" =~ ^[0-9]+$ ]] || { echo "PR number not an integer: $number" >&2; exit 1; }
          echo "number=$number" >> "$GITHUB_OUTPUT"

      # --- Checkout so we can create the orphan companion branch and push to it ---
      - name: Checkout default branch
        uses: actions/checkout@v6.0.1
        # persist-credentials left default (true): this job pushes the companion branch.

      # continue-on-error: the compare run only uploads this artifact when there were diffs (a
      # regression). On a clean pass it does not exist, and download-artifact errors on a missing
      # named artifact -- which must NOT fail the job. The next step then sees no *_compare.png and
      # treats it as "no differences".
      - name: Download screenshot diff artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: screenshot-diff
          path: screenshot-diff
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      # The summary JSON is uploaded on every run. continue-on-error: an older producer run (before
      # this artifact existed) or a download hiccup must NOT fail the job -- the summary step below
      # falls back to a "summary unavailable" body when the file is missing.
      - name: Download screenshot summary artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: screenshot-summary
          path: screenshot-summary
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      # Instrumented render captures from the device-screenshots matrix (screenshot-test.yml). One
      # artifact per API band; `pattern` + `merge-multiple` folds both into ./device-screenshots.
      # continue-on-error: the emulator job may not have run (older producer) or a band may have
      # produced nothing -- a missing/empty artifact must NOT fail this job. The device gallery step
      # below simply renders no rows when the dir is empty.
      - name: Download device screenshot artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: device-screenshots-api*
          merge-multiple: true
          path: device-screenshots
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      # The committed goldens, uploaded on every run. continue-on-error: an older producer run (before
      # this artifact existed) or a download hiccup must NOT fail the job -- the goldens gallery step
      # below simply renders nothing when the dir is empty.
      - name: Download screenshot goldens artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: screenshot-goldens
          path: goldens
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      # AGP's additionalTestOutputDir pull nests each capture under a DEVICE-named subdir like
      # "androidDeviceTest/connected/emulator-5554 - 11/band_api30_..._actual.png" -- note the SPACES.
      # The safe-set filter (^[a-zA-Z0-9_./-]+$, no space) that every check/push/gallery step applies to
      # the FULL path then rejects every device PNG, so the gallery silently renders nothing. The
      # filenames themselves (band_api<SDK>_<case>_<kind>.png) are already space-free, and the gallery
      # only ever parses the basename -- the subdir hierarchy carries no information. So flatten every
      # device PNG to device-flat/<basename> up front; downstream steps then see space-free paths and
      # the existing basename-shaped filters/regex just work.
      - name: Flatten device captures
        shell: bash
        run: |
          mkdir -p device-flat
          if [[ -d device-screenshots ]]; then
            # -exec cp per file: names collide only if two bands emit the same basename, but each carries
            # its api in band_api<SDK>_, so api30 vs api34 captures never clash.
            find device-screenshots -type f -name "*.png" -exec cp {} device-flat/ \;
          fi

      # --- Is there anything to push to the companion branch? ---
      # `diff`   = valid *_compare.png Roborazzi diff images exist (a regression).
      # `device` = instrumented render captures exist (present on every emulator run, not just diffs).
      # `golden` = committed goldens downloaded (present on every run -> gallery is always-on).
      # `any`    = any of the three -- the push + companion branch run when ANY is true.
      - id: check
        name: Check for images to publish
        shell: bash
        run: |
          # Roborazzi diff images (only exist on a mismatch).
          diff="false"
          while IFS= read -r f; do
            # Reject any path with characters outside the safe set before we touch git / build URLs.
            [[ "$f" =~ ^[a-zA-Z0-9_./-]+$ ]] && { diff="true"; break; }
          done < <(find . -type f -name "*_compare.png")

          # Device render captures, flattened to device-flat/<basename> (see "Flatten device captures").
          # Filter on basename so a stray odd char in a name is still caught; the dir itself is
          # space-free by construction.
          device="false"
          if [[ -d device-flat ]]; then
            while IFS= read -r f; do
              bn=$(basename "$f")
              [[ "$bn" =~ ^[a-zA-Z0-9_.-]+$ ]] && { device="true"; break; }
            done < <(find device-flat -type f -name "*.png")
          fi

          # Committed goldens under goldens/.
          golden="false"
          if [[ -d goldens ]]; then
            while IFS= read -r f; do
              [[ "$f" =~ ^[a-zA-Z0-9_./-]+$ ]] && { golden="true"; break; }
            done < <(find goldens -type f -name "*.png")
          fi

          any="false"
          [[ "$diff" == "true" || "$device" == "true" || "$golden" == "true" ]] && any="true"
          {
            echo "diff=$diff"
            echo "device=$device"
            echo "golden=$golden"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"

      # --- Push images to an orphan companion branch (diff images and/or device captures) ---
      - id: push
        name: Push images to companion branch
        if: steps.check.outputs.any == 'true'
        shell: bash
        env:
          # Keyed by PR number (integer-guarded above), not head_branch -- two fork PRs can share a
          # branch name and would otherwise overwrite each other's companion branch / gallery.
          BRANCH_NAME: companion_pr-${{ steps.pr.outputs.number }}
        run: |
          # Orphan branch: no history, just the images for this PR head.
          git branch -D "$BRANCH_NAME" || true
          git checkout --orphan "$BRANCH_NAME"
          git rm -rf . > /dev/null

          # Roborazzi diff images (roborazzi/...) + flattened device captures (device-flat/...) +
          # committed goldens (goldens/...). All three trees are now space-free, so the same safe-set
          # path filter applies before staging fork-run-produced files.
          while IFS= read -r f; do
            if [[ "$f" =~ ^[a-zA-Z0-9_./-]+$ ]]; then
              git add "$f"
            fi
          done < <(find . -type f \( -name "*_compare.png" -o -path "./device-flat/*.png" -o -path "./goldens/*.png" \))
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add screenshots for PR #${{ steps.pr.outputs.number }}"
          git push origin "HEAD:$BRANCH_NAME" -f

      # --- Summary report (ALWAYS): parse results-summary.json into a counts table + verdict line ---
      # jq is preinstalled on ubuntu-latest. The JSON is CI-produced (not fork-controlled); still
      # read with `jq -r` (no eval), quote everything, and basename+regex-sanitize displayed names.
      - id: summary
        name: Generate summary report
        shell: bash
        env:
          # Producer conclusion -- a run that did not succeed must not be labelled "all good".
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          # Link to the producing run so reviewers can grab the screenshot-report artifact (the
          # unzipped HTML cannot be deep-linked; the run page exposes the artifact downloads).
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
        run: |
          # `|| true`: the artifact is absent whenever the producing run failed before writing the
          # summary; under `set -e -o pipefail` a bare failing find kills this step before the
          # "summary unavailable" fallback below can run.
          summary_json="$(find screenshot-summary -type f -name 'results-summary.json' 2>/dev/null | head -n1 || true)"
          delimiter="$(openssl rand -hex 8)"
          {
            echo "body<<${delimiter}"
            echo "### Snapshot diff report"
            echo ""
            if [[ -z "$summary_json" || ! -f "$summary_json" ]]; then
              echo "Screenshot summary unavailable (results-summary.json not found)."
              if [[ "$CONCLUSION" != "success" ]]; then
                echo ""
                echo ":x: The screenshot check run did not succeed."
              fi
            else
              total=$(jq -r '.summary.total // 0' "$summary_json")
              unchanged=$(jq -r '.summary.unchanged // 0' "$summary_json")
              changed=$(jq -r '.summary.changed // 0' "$summary_json")
              added=$(jq -r '.summary.added // 0' "$summary_json")

              if [[ "$CONCLUSION" != "success" ]]; then
                echo ":x: The screenshot check run did not succeed -- counts below may be incomplete."
                echo ""
              fi
              if [[ "$changed" -eq 0 && "$added" -eq 0 ]]; then
                echo ":white_check_mark: ${total} screenshots verified, no changes."
              else
                echo ":warning: $((changed + added)) of ${total} screenshots changed."
              fi
              echo ""
              echo "| Total | Unchanged | Changed | Added |"
              echo "|------:|----------:|--------:|------:|"
              echo "| ${total} | ${unchanged} | ${changed} | ${added} |"

              if [[ "$changed" -gt 0 ]]; then
                echo ""
                echo "Changed:"
                while IFS= read -r p; do
                  bn=$(basename "$p")
                  if [[ "$bn" =~ ^[a-zA-Z0-9_.-]+$ ]]; then
                    echo "- \`${bn}\`"
                  fi
                done < <(jq -r '.results[] | select(.type=="changed") | .golden_file_path' "$summary_json")
              fi
            fi
            echo ""
            echo "[Full screenshot report (artifact)](${RUN_URL})"
          } >> "$GITHUB_OUTPUT"
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      # --- Goldens gallery (ALWAYS, whenever goldens were downloaded): the committed reference PNGs each
      # spec asserts against, inlined from the companion branch. This is NOT a diff -- it shows the
      # current expected state so a reviewer sees the actual screenshots in the PR even on a clean pass
      # (the whole point of this section). goldens/ came from our own upload-artifact, but apply the
      # same ^[a-zA-Z0-9_./-]+$ safe-set filter as the other galleries before building any URL.
      - id: goldens
        name: Generate goldens gallery
        if: steps.check.outputs.golden == 'true'
        shell: bash
        env:
          # Must match the push step's branch key (PR number, not head_branch).
          BRANCH_NAME: companion_pr-${{ steps.pr.outputs.number }}
        run: |
          files=$(find goldens -type f -name "*.png" | grep -E "^[a-zA-Z0-9_./-]+$" || true)
          delimiter="$(openssl rand -hex 8)"
          {
            echo "body<<${delimiter}"
            echo ""
            echo "### Screenshots"
            echo ""
            echo "Committed reference screenshots each spec verifies against (current expected state)."
            echo ""
            echo "| File name | Image |"
            echo "|-----------|-------|"
          } >> "$GITHUB_OUTPUT"
          for f in $files; do
            name=$(basename "$f")
            url="https://github.com/${{ github.repository }}/blob/$BRANCH_NAME/$f"
            echo "| \`$name\` | ![]($url?raw=true) |" >> "$GITHUB_OUTPUT"
          done
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      # --- Gallery (ONLY when there are diffs): inline before/after/diff images from companion branch.
      # Emits a markdown fragment that the comment step appends below the summary, so a regression
      # comment shows BOTH the counts AND the images in one sticky comment.
      - id: gallery
        name: Generate diff gallery
        if: steps.check.outputs.diff == 'true'
        shell: bash
        env:
          # Must match the push step's branch key (PR number, not head_branch).
          BRANCH_NAME: companion_pr-${{ steps.pr.outputs.number }}
          # head_branch is fork-controlled and is only echoed as display text below; pass via env and
          # reference as a quoted shell var so it reaches the script as data, never expanded into the
          # script body (injection-safe).
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          files=$(find . -type f -name "*_compare.png" | grep "roborazzi/" | grep -E "^[a-zA-Z0-9_./-]+$" || true)
          delimiter="$(openssl rand -hex 8)"
          {
            echo "body<<${delimiter}"
            echo ""
            echo "Screenshot differences detected vs goldens on \`${HEAD_BRANCH}\`."
            echo "Each image is *expected | actual | diff* side by side."
            echo ""
            echo "| File name | Image |"
            echo "|-----------|-------|"
          } >> "$GITHUB_OUTPUT"
          for f in $files; do
            name=$(basename "$f" | sed -r 's/(.{20})/\1<br>/g')
            url="https://github.com/${{ github.repository }}/blob/$BRANCH_NAME/$f"
            echo "| [$name]($url) | ![]($url?raw=true) |" >> "$GITHUB_OUTPUT"
          done
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      # --- Device render gallery (ALWAYS, whenever captures exist): the actual pixels each API band
      # drew on the emulator. This is NOT a regression diff -- it is render evidence, so it shows on
      # every run that produced captures, independent of the Roborazzi diff above. One row per (band,
      # case): actual, and expected beside it if the spec wrote one. Filenames are
      # band_api<SDK>_<case>_{actual,expected}.png (see MirageBandScreenshotTest); read from the
      # flattened device-flat/ tree (AGP nests them under a device-named subdir with SPACES, which the
      # safe-set filter rejects -- see "Flatten device captures"). Parse as UNTRUSTED: basename-only
      # safe-set gate, then pull SDK/case/kind out with pure bash (no eval).
      - id: device_gallery
        name: Generate device render gallery
        if: steps.check.outputs.device == 'true'
        shell: bash
        env:
          # Must match the push step's branch key (PR number, not head_branch).
          BRANCH_NAME: companion_pr-${{ steps.pr.outputs.number }}
        run: |
          delimiter="$(openssl rand -hex 8)"
          {
            echo "body<<${delimiter}"
            echo ""
            echo "### Device rendering"
            echo ""
            echo "Actual pixels captured on the emulator per API band (API 30 = GLES mirage + legacy blur, API 34 = AGSL + RenderEffect). Render evidence, not a golden diff."
            echo ""
            echo "| Band | Case | Actual | Expected |"
            echo "|------|------|--------|----------|"
          } >> "$GITHUB_OUTPUT"

          # Collect one logical row per api+case, then emit actual|expected columns for each.
          # Assoc arrays keyed by "<api>|<case>"; value is the safe repo-relative path to that PNG.
          declare -A actual expected
          declare -A seen
          while IFS= read -r f; do
            # Captures are flattened to device-flat/<basename> (space-free); gate on the basename so a
            # stray odd char in a name is still rejected before it reaches any URL.
            bn=$(basename "$f" .png)
            [[ "$bn" =~ ^[a-zA-Z0-9_.-]+$ ]] || continue
            # Expect band_api<SDK>_<case>_<kind>. Enforce the shape with a regex; ignore non-matching.
            [[ "$bn" =~ ^band_api([0-9]+)_(.+)_(actual|expected)$ ]] || continue
            api="${BASH_REMATCH[1]}"
            case="${BASH_REMATCH[2]}"
            kind="${BASH_REMATCH[3]}"
            key="${api}|${case}"
            seen["$key"]=1
            if [[ "$kind" == "actual" ]]; then
              actual["$key"]="$f"
            else
              expected["$key"]="$f"
            fi
          done < <(find device-flat -type f -name "*.png")

          # Stable order: sort the composite keys (api numeric-ish then case).
          for key in $(printf '%s\n' "${!seen[@]}" | sort); do
            api="${key%%|*}"
            case="${key#*|}"
            a="${actual[$key]:-}"
            e="${expected[$key]:-}"
            if [[ -n "$a" ]]; then
              aurl="https://github.com/${{ github.repository }}/blob/$BRANCH_NAME/$a?raw=true"
              acell="![]($aurl)"
            else
              acell="_(none)_"
            fi
            if [[ -n "$e" ]]; then
              eurl="https://github.com/${{ github.repository }}/blob/$BRANCH_NAME/$e?raw=true"
              ecell="![]($eurl)"
            else
              ecell="_(none)_"
            fi
            echo "| API ${api} | \`${case}\` | ${acell} | ${ecell} |" >> "$GITHUB_OUTPUT"
          done
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      # --- Sticky comment: find the bot's previous comment (if any) by marker text ---
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- roborazzi-screenshot-diff -->'

      # --- Single sticky comment, ALWAYS posted on pull_request runs: summary + optional galleries.
      # Order: summary -> goldens (always, the committed reference shots) -> diff gallery (regression
      # only) -> device gallery (emulator captures only). Each gallery output is empty when its step
      # was skipped, so the comment degrades to just the summary and whatever galleries have content.
      - name: Comment screenshot report
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.pr.outputs.number }}
          edit-mode: replace
          body: |
            <!-- roborazzi-screenshot-diff -->
            ${{ steps.summary.outputs.body }}
            ${{ steps.goldens.outputs.body }}
            ${{ steps.gallery.outputs.body }}
            ${{ steps.device_gallery.outputs.body }}

      # --- Housekeeping: prune companion_* branches older than 30 days so they don't pile up ---
      - name: Cleanup outdated companion branches
        if: always()
        shell: bash
        run: |
          git fetch origin --quiet || true
          now=$(date +%s)
          # `|| true` on grep: with no companion_* branches yet, grep exits 1, which under the
          # default `bash -e -o pipefail` would fail this step. Absorb it so cleanup is a no-op.
          branches=$(git branch -r --format='%(refname:lstrip=3)' | grep '^companion_' || true)
          for branch in $branches; do
            last=$(git log -1 --format=%ct "origin/$branch" 2>/dev/null || echo "$now")
            if [ $((now - last)) -gt 2592000 ]; then   # 30 days
              echo "Deleting stale companion branch: $branch"
              git push origin --delete "$branch" || true
            fi
          done
