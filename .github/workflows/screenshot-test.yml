name: Screenshot Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '*' ]

jobs:
  roborazzi:
    name: Roborazzi verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5.1.0
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # Verifies recorded goldens under cloudy/src/androidUnitTest/assets/screenshots/.
      # Pure JVM (Robolectric native graphics) -- no emulator. Regenerate goldens locally with
      # ./gradlew :cloudy:recordRoborazziDebug when an intentional UI change lands.
      - name: Verify screenshots
        run: ./gradlew :cloudy:verifyRoborazziDebug

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-diffs
          path: cloudy/build/outputs/roborazzi
          if-no-files-found: ignore
          retention-days: 7
