# Screenshot regression check (UNTRUSTED half of the two-workflow split).
#
# Why two workflows: this PR stream includes fork PRs (e.g. l2hyunwoo -> skydoves).
# Workflows triggered by `pull_request` from a fork get a READ-ONLY GITHUB_TOKEN with no
# secrets, so they cannot push a branch or comment on the PR. This workflow therefore does
# the untrusted work only -- run the screenshot check and UPLOAD ARTIFACTS. The privileged
# half (push diff images + comment) lives in screenshot-comment.yml, triggered via
# `workflow_run` so it runs in the base-repo context with a write token.
# See: https://docs.github.com/actions -> workflow_run "label or comment on pull requests from forks".
#
# Why no StoreScreenshot baseline workflow (the upstream sample has one): Cloudy commits its
# goldens in-repo under cloudy/src/androidHostTest/assets/screenshots/, so verifyRoborazziAndroidHostTest
# compares the fresh capture against the committed PNG directly. There is no per-branch baseline
# to stash as an artifact, so the third workflow from
# takahirom/roborazzi-compare-on-github-comment-sample is intentionally omitted.

name: Screenshot Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '*' ]

# Default to no permissions; grant the minimum per job.
permissions: {}

jobs:
  roborazzi:
    name: Roborazzi verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read   # clone only
      actions: write   # upload-artifact
    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.1
        with:
          persist-credentials: false   # this job never pushes

      - name: Set up JDK 21
        uses: actions/setup-java@v5.1.0
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # Verifies recorded goldens under cloudy/src/androidHostTest/assets/screenshots/.
      # Pure JVM (Robolectric native graphics) -- no emulator. Regenerate goldens locally with
      # ./gradlew :cloudy:recordRoborazziAndroidHostTest when an intentional UI change lands.
      # On a mismatch this FAILS the build (red check) and Roborazzi writes
      # <name>_compare.png (side-by-side before/after/diff) + <name>_actual.png to
      # cloudy/build/outputs/roborazzi/ -- verified by a corrupt-golden probe.
      - name: Verify screenshots
        run: ./gradlew :cloudy:verifyRoborazziAndroidHostTest

      # The *_compare.png diff images only exist when verify FAILED (a mismatch). On a clean pass
      # this dir is empty, so if-no-files-found: ignore keeps the step green and silent. The
      # comment workflow consumes this artifact to build the gallery.
      - name: Upload screenshot diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diff
          path: cloudy/build/outputs/roborazzi
          if-no-files-found: ignore
          retention-days: 7

      # The HTML report (all goldens, pass or fail) is always generated by the verify task -- upload
      # it on every run so reviewers can browse the full gallery even when nothing regressed.
      - name: Upload screenshot report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-report
          path: cloudy/build/reports/roborazzi
          if-no-files-found: warn
          retention-days: 7

      # results-summary.json is written by verifyRoborazziAndroidHostTest on EVERY run (pass or fail) and
      # carries the per-run counts (total/unchanged/changed/added). The comment workflow reads it to
      # post an always-on summary comment, not just a gallery on regression.
      - name: Upload screenshot summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-summary
          # The KMP android host test writes under .../roborazzi/androidHostTest/ (not .../debug/);
          # glob the variant segment so a task rename cannot silently drop the artifact again.
          path: cloudy/build/test-results/roborazzi/**/results-summary.json
          if-no-files-found: warn
          retention-days: 7

      # Stash the PR number so the privileged workflow_run job can resolve which PR to comment on
      # (workflow_run payload does not carry it directly).
      # always() so the PR number is still stashed when the verify step above FAILS (a regression) --
      # otherwise the comment workflow can't resolve the PR and the diff gallery never posts on the
      # exact runs that need it most.
      - name: Save PR number
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: |
          mkdir -p ./pr
          echo "$PR_NUMBER" > ./pr/NR

      - name: Upload PR number
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr
          path: pr/
          retention-days: 7
